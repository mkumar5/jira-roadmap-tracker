name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  validate:
    name: Type Check + Lint + Test + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Production build
        run: npm run build
        env:
          # Placeholder values for CI build — real values via Vercel env vars
          VITE_JIRA_HOST: ci.atlassian.net
          VITE_JIRA_EMAIL: ci@example.com
          VITE_JIRA_API_TOKEN: ci-token
          VITE_JIRA_PROJECT_KEYS: CI
          VITE_HIERARCHY_STRATEGY: JIRA_PREMIUM
          VITE_APP_NAME: Jira Roadmap Manager

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
